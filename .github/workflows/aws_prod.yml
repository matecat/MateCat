# ─────────────────────────────────────────────────────────────────────────────
# Production: test on every PR/push to master, deploy ONLY on semver tags (v*)
# ─────────────────────────────────────────────────────────────────────────────
name: "CI/CD: Production"
on:
  push:
    branches: [ "master" ]
    tags: [ "v*" ]
  pull_request:
    branches: [ "master" ]
jobs:
  ci-cd:
    uses: ./.github/workflows/_ci-cd.yml
    with:
      deploy_environment: production
      should_deploy: ${{ startsWith(github.ref, 'refs/tags/v') }}
    secrets: inherit
