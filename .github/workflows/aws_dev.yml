# ─────────────────────────────────────────────────────────────────────────────
# Develop: test on every PR/push to develop, deploy only on push to develop
# ─────────────────────────────────────────────────────────────────────────────
name: "CI/CD: Develop (Freddy)"
on:
  push:
    branches: [ "develop" ]
  pull_request:
    branches: [ "develop" ]
permissions:
  contents: read
jobs:
  ci-cd:
    uses: ./.github/workflows/_ci-cd.yml
    with:
      deploy_environment: develop
      should_deploy: ${{ github.event_name == 'push' }}
    secrets: inherit
